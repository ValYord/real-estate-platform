name: CI

on:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Placeholder values so next build can substitute NEXT_PUBLIC_* at build time.
      # Real values are stored in GitHub Secrets and never committed.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
